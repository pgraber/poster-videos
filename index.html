<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
      max-width: 900px;
    }

    .cell {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

.caption {
      text-align: center;
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      padding: 2px 0;
    }

    video {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      display: block;
      border-radius: 4px;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="grid">
    <div class="cell">
      <div class="caption">Uncoated MSN</div>
      <video id="v0" muted loop playsinline autoplay preload="auto">
        <source src="video0.mp4" type="video/mp4">
      </video>
    </div>
    <div class="cell">
      <div class="caption">MSN-Lf</div>
      <video id="v1" muted loop playsinline autoplay preload="auto">
        <source src="video1.mp4" type="video/mp4">
      </video>
    </div>
    <div class="cell">
      <div class="caption">MSN-PEG</div>
      <video id="v2" muted loop playsinline autoplay preload="auto">
        <source src="video2.mp4" type="video/mp4">
      </video>
    </div>
    <div class="cell">
      <div class="caption">MSN-PEG-Lf</div>
      <video id="v3" muted loop playsinline autoplay preload="auto">
        <source src="video3.mp4" type="video/mp4">
      </video>
    </div>
  </div>

  <div id="tap-prompt" style="
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75);
    color:#fff; font-size:1.6rem; font-weight:700; font-family:sans-serif;
    align-items:center; justify-content:center; text-align:center; z-index:10;
    cursor:pointer;">
    Tap to play
  </div>

  <script>
    const videos = [
      document.getElementById('v0'),
      document.getElementById('v1'),
      document.getElementById('v2'),
      document.getElementById('v3'),
    ];
    const prompt = document.getElementById('tap-prompt');

    let tapped = false;
    let allReady = false;

    function startAll() {
      prompt.style.display = 'none';
      videos.forEach(v => { v.currentTime = 0; v.play(); });
    }

    // Register tap at any time — if videos ready, go; if not, wait
    document.addEventListener('click', () => {
      tapped = true;
      if (allReady) startAll();
    }, { once: true });

    let ready = 0;
    function onReady() {
      ready++;
      if (ready < videos.length) return;
      allReady = true;
      if (tapped) {
        startAll();
      } else {
        prompt.style.display = 'flex';
      }
    }

    videos.forEach(v => {
      if (v.readyState >= 3) {
        onReady();
      } else {
        v.addEventListener('canplaythrough', onReady, { once: true });
      }
    });
  </script>
</body>
</html>
